{% extends "auth_base.html" %}

{% block title %}Set Password{% endblock %}
{% block icon %}lock{% endblock %}
{% block header_title %}Set Password{% endblock %}
{% block header_sub %}Please set a secure password for {{ email }}{% endblock %}

{% block form_content %}
<form action="/activate/complete" method="POST" class="space-y-5">
    <input type="hidden" name="email" value="{{ email }}">
    <div>
        <label for="password" class="block text-xs font-bold text-[#475569] dark:text-[#94a3b8] uppercase tracking-wider mb-2">New Password</label>
        <input type="password" name="password" id="password" required placeholder="••••••••" minlength="4"
               class="w-full pl-4 pr-4 py-3 bg-white/50 dark:bg-[#0f172a]/50 border border-[#e2e8f0] dark:border-[#1e293b] rounded-xl text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none text-[#0f172a] dark:text-[#f1f5f9]">
    </div>

    <div>
        <label for="confirm_password" class="block text-xs font-bold text-[#475569] dark:text-[#94a3b8] uppercase tracking-wider mb-2">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required placeholder="••••••••" minlength="4"
               class="w-full pl-4 pr-4 py-3 bg-white/50 dark:bg-[#0f172a]/50 border border-[#e2e8f0] dark:border-[#1e293b] rounded-xl text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none text-[#0f172a] dark:text-[#f1f5f9]">
    </div>

    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-600/15 hover:shadow-blue-600/20 active:transform active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        <span>Complete Activation</span>
        <i data-lucide="check-circle" class="w-4 h-4"></i>
    </button>
</form>
{% endblock %}
