<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWU Portal - {% block title %}{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #bfdbfe 100%);
        }
        .dark body {
            background: linear-gradient(135deg, #090d16 0%, #0f172a 50%, #1e1b4b 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-200">
    <div class="w-full max-w-[420px] bg-white/70 dark:bg-[#0a0f1e]/80 backdrop-blur-xl border border-white/20 dark:border-white/10 p-8 rounded-2xl shadow-2xl relative overflow-hidden">
        <!-- Brand header -->
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl mx-auto mb-4 shadow-lg shadow-blue-500/20">
                <i data-lucide="{% block icon %}{% endblock %}" class="w-7 h-7"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-[#0f172a] dark:text-[#f1f5f9] tracking-tight">{% block header_title %}{% endblock %}</h1>
            <p class="text-sm text-[#475569] dark:text-[#94a3b8] mt-1">{% block header_sub %}{% endblock %}</p>
        </div>

        {% block form_content %}{% endblock %}
    </div>

    <!-- Alert / Toast display -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden transition-all duration-300 transform translate-y-4 opacity-0">
        <div class="bg-red-50 dark:bg-red-950/20 border-l-4 border-red-500 p-4 rounded-lg shadow-xl flex items-center gap-3">
            <i data-lucide="x-circle" class="w-5 h-5 text-red-500"></i>
            <div>
                <p class="font-bold text-sm text-red-800 dark:text-red-400">Notice</p>
                <p class="text-xs text-red-600 dark:text-red-500" id="toast-text"></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // Clear active tab history to ensure they start on the dashboard tab upon successful login
        localStorage.removeItem('admin_active_tab');
        localStorage.removeItem('faculty_active_tab');
        localStorage.removeItem('student_active_tab');

        const activeTheme = localStorage.getItem('ewu_theme') || 'light';
        if (activeTheme === 'cosmic' || activeTheme === 'image') {
            document.documentElement.classList.add('dark');
        }

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    window.addEventListener('DOMContentLoaded', function() {
                        const toast = document.getElementById('toast');
                        const text = document.getElementById('toast-text');
                        text.textContent = {{ message | tojson }};
                        toast.classList.remove('hidden');
                        setTimeout(() => toast.classList.remove('translate-y-4', 'opacity-0'), 50);
                        setTimeout(() => {
                            toast.classList.add('translate-y-4', 'opacity-0');
                            setTimeout(() => toast.classList.add('hidden'), 300);
                        }, 5000);
                    });
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
</body>
</html>
